apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortliner
  namespace: shortliner
  labels:
    app: shortliner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shortliner
  template:
    metadata:
      labels:
        app: shortliner
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: shortliner
      # Spot Pods for cost savings — safe here since this is stateless and
      # tolerates a restart on preemption.
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: shortliner
          # Patched by .github/workflows/deploy.yml on every push to master
          # — never edited by hand.
          image: ghcr.io/lukaszsiedlecki/shortliner:sha-cd6cc8a
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: shortliner-db-secret
                  key: SHORTLINER_DB_HOST
            - name: DB_NAME
              value: "shortliner"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shortliner-db-secret
                  key: SHORTLINER_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shortliner-db-secret
                  key: SHORTLINER_DB_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: LOGGING_STRUCTURED_FORMAT_CONSOLE
              value: "logstash"
              # Set OTEL_TRACING_EXPORT_ENABLED=true and point OTEL_EXPORTER_OTLP_ENDPOINT
              # at a collector (e.g. Tempo/Jaeger OTLP HTTP receiver) once one is deployed.
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
