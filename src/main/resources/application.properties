spring.docker.compose.enabled=false
spring.profiles.active=dev
# Kubernetes health probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.exposure.include=health,prometheus,metrics

# Prometheus metrics
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Distributed tracing (OpenTelemetry). Export is opt-in until a collector
# endpoint is available; toggle via OTEL_TRACING_EXPORT_ENABLED once one is.
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.tracing.export.enabled=${OTEL_TRACING_EXPORT_ENABLED:false}

# Structured JSON logs (trace/span IDs are included automatically via MDC).
# Unset by default for readable local console output; set to "logstash" or
# "ecs" in environments with a log aggregator (e.g. Loki, ELK).
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT_CONSOLE:}
