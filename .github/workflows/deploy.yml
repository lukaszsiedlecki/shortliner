name: Build, push, and notify homelab

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/lukaszsiedlecki/shortliner:${{ steps.vars.outputs.tag }}

  notify-homelab:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy-image event to homelab
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMELAB_DISPATCH_PAT }}
          repository: lukaszsiedlecki/homelab
          event-type: deploy-image
          client-payload: |
            {"service": "shortliner", "tag": "${{ needs.build-and-push.outputs.tag }}"}
